services:
  app:
    build:
      context: .
      args:
        - APP_NAME=Laravel
        - APP_ENV=local
        - APP_KEY=base64:ULsVv/IzUF0Gh0Rq91ZUHL42TIOUB7oXH2oer//kwWw=
        - APP_DEBUG=true
        - APP_URL=http://localhost
        - FRONTEND_URL=http://localhost:5173
        - LOG_LEVEL=debug
        - DB_CONNECTION=mysql
        - DB_HOST=db
        - DB_PORT=3306
        - DB_DATABASE=aura
        - DB_USERNAME=root
        - DB_PASSWORD=secret
    ports:
      - "8000:80"
    depends_on:
      - db
    volumes:
      - ./.env:/var/www/html/.env
    environment:
      # These will be passed directly if the container doesn't read the .env volume properly
      DB_HOST: db
      DB_PASSWORD: secret

  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: aura
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  db_data:
